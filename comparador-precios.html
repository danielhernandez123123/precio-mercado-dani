<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrecioMercado — Compara tus supermercados</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --gray: #5F5E5A;
    --gray-light: #F1EFE8;
    --text: #2C2C2A;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.12);
    --surface: #fff;
    --bg: #F7F6F2;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 17px;
    font-weight: 600;
    color: var(--green-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon { font-size: 22px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gray-light);
    border-radius: 20px;
    padding: 4px 12px 4px 4px;
    font-size: 13px;
    color: var(--text);
  }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .btn {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface);
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
  }
  .btn:hover { background: var(--gray-light); }
  .btn-primary {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { color: var(--red); border-color: var(--red-light); }
  .btn-danger:hover { background: var(--red-light); }

  /* LOGIN SCREEN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 56px);
    padding: 2rem;
    text-align: center;
  }
  .login-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    max-width: 360px;
    width: 100%;
  }
  .login-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 1.5rem; }
  .btn-google {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-google:hover { background: var(--gray-light); }
  .google-logo { width: 20px; height: 20px; }

  /* MAIN APP */
  #app { display: none; }
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* SEARCH */
  .search-wrap {
    display: flex; gap: 8px; margin-bottom: 1.5rem;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--green); }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .count-badge {
    background: var(--gray-light);
    color: var(--gray);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }
  .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .product-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px;
    margin-bottom: 10px;
  }
  .product-name { font-weight: 600; font-size: 15px; }
  .product-category {
    font-size: 12px; color: var(--text-muted);
    background: var(--gray-light);
    padding: 2px 8px; border-radius: 10px;
    white-space: nowrap;
  }
  .product-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* PRICES GRID */
  .prices-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .price-cell {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    position: relative;
  }
  .price-cell.best-price {
    border-color: var(--green);
    background: var(--green-light);
  }
  .price-cell.no-price { opacity: 0.45; }
  .store-name {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .price-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .price-cell.best-price .price-value { color: var(--green-dark); }
  .price-cell.best-price::after {
    content: '✓ más barato';
    position: absolute;
    top: 6px; right: 8px;
    font-size: 10px;
    color: var(--green);
    font-weight: 600;
  }
  .price-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .price-na {
    font-size: 14px;
    color: var(--text-muted);
  }
  .edit-price-btn {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 3px;
    font-size: 11px;
    text-align: center;
    border: 0.5px dashed var(--border);
    border-radius: 5px;
    background: none;
    cursor: pointer;
    color: var(--text-muted);
    transition: background 0.1s, color 0.1s;
  }
  .edit-price-btn:hover { background: var(--gray-light); color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }
  .empty-state p { margin-bottom: 1rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%; max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px;
    color: var(--text-muted); margin-bottom: 5px;
  }
  .form-control {
    width: 100%;
    padding: 8px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .form-control:focus { border-color: var(--green); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

  /* PRICES FORM IN MODAL */
  .store-prices-section { margin-top: 1rem; }
  .store-prices-section h4 {
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .store-price-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .store-price-row label {
    font-size: 13px; width: 140px; flex-shrink: 0;
    color: var(--text);
  }
  .price-input-wrap {
    flex: 1; position: relative;
  }
  .price-input-wrap span {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px; color: var(--text-muted);
  }
  .price-input-wrap input {
    width: 100%; padding: 7px 10px 7px 22px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .price-input-wrap input:focus { border-color: var(--green); }

  /* LOADING */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 3rem; color: var(--text-muted); font-size: 14px;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 1.5rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
  }
  .tab {
    flex: 1; padding: 7px;
    text-align: center; font-size: 13px;
    border-radius: 6px; cursor: pointer;
    color: var(--text-muted); border: none; background: none;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--green);
    color: #fff; font-weight: 500;
  }

  /* SAVINGS SUMMARY */
  .savings-bar {
    background: var(--green-light);
    border: 0.5px solid var(--green);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    margin-bottom: 1.5rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .savings-bar.visible { display: flex; }
  .savings-bar p { font-size: 13px; color: var(--green-dark); }
  .savings-bar strong { font-weight: 600; }

  @media (max-width: 600px) {
    .prices-grid { grid-template-columns: 1fr; }
    .price-cell.best-price::after { display: none; }
    nav { padding: 0 1rem; }
    .user-name-nav { display: none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>

<!-- LOGIN SCREEN -->

        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>

<!-- MAIN APP -->
<div id="app">
  <div class="container">

    <!-- SEARCH + ADD -->

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ==========================================
// 🔧 CONFIGURACIÓN FIREBASE
// Reemplaza estos valores con los tuyos de Firebase Console
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBU9i_M6Z0HuzSyN-RahiLZ76i87EZy2EU",
  authDomain: "marketcheckerdani.firebaseapp.com",
  projectId: "marketcheckerdani",
  storageBucket: "marketcheckerdani.firebasestorage.app",
  messagingSenderId: "180711430807",
  appId: "1:180711430807:web:96f9c809a46d67813f27d2"
};
// ==========================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STORES = [
  { id: 'jumbo', label: 'Jumbo Portal Ñuñoa', icon: '🏬' },
  { id: 'lider', label: 'Líder Av. Vespucio', icon: '🏬' },
  { id: 'mass',  label: 'Mass Av. Vespucio',  icon: '🏪' },
];

let currentUser = null;
let allProducts = [];
let currentTab = 'all';
let editingProductId = null;
let editingPriceCtx = null; // {productId, storeId}
let unsubscribe = null;

// ── AUTH ──────────────────────────────────
window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('Error al iniciar sesión: ' + e.message); }
};

window.logout = async () => {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-chip').style.display = 'flex';
    document.getElementById('logout-btn').style.display = 'block';
    document.getElementById('user-name-nav').textContent = user.displayName?.split(' ')[0] || '';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" alt="">`;
    else av.textContent = (user.displayName || '?')[0].toUpperCase();
    listenProducts();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('user-chip').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    allProducts = [];
    renderProducts();
  }
});

// ── FIRESTORE ─────────────────────────────
function listenProducts() {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, 'users', currentUser.uid, 'products'));
  unsubscribe = onSnapshot(q, snap => {
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allProducts.sort((a,b) => a.name.localeCompare(b.name, 'es'));
    renderProducts();
  });
}

async function saveProductToDb(product) {
  const ref = doc(db, 'users', currentUser.uid, 'products', product.id);
  await setDoc(ref, product);
}

async function deleteProductFromDb(id) {
  await deleteDoc(doc(db, 'users', currentUser.uid, 'products', id));
}

// ── RENDER ────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return allProducts.filter(p => {
    const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q);
    const matchTab = currentTab === 'all' || p.category === currentTab;
    return matchSearch && matchTab;
  });
}

function renderProducts() {
  const list = document.getElementById('product-list');
  const filtered = getFiltered();
  document.getElementById('product-count').textContent = filtered.length;
  updateSavingsBar(filtered);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <p>No hay productos todavía</p>
      <button class="btn btn-primary" onclick="openAddProduct()">+ Agregar el primero</button>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const prices = p.prices || {};
  const validPrices = STORES.filter(s => prices[s.id] > 0).map(s => ({ ...s, value: prices[s.id] }));
  const minPrice = validPrices.length ? Math.min(...validPrices.map(v => v.value)) : null;

  const cells = STORES.map(s => {
    const val = prices[s.id];
    const isBest = val > 0 && val === minPrice;
    const noPrice = !val || val <= 0;
    return `<div class="price-cell ${isBest ? 'best-price' : ''} ${noPrice ? 'no-price' : ''}">
      <div class="store-name">${s.icon} ${s.label}</div>
      ${noPrice
        ? `<div class="price-na">Sin precio</div>`
        : `<div class="price-value">${formatPrice(val)}</div>
           <div class="price-date">actualizado hoy</div>`
      }
      <button class="edit-price-btn" onclick="openPriceEdit('${p.id}','${s.id}','${s.label}',${val||0})">
        ✏ ${noPrice ? 'Agregar precio' : 'Editar'}
      </button>
    </div>`;
  }).join('');

  return `<div class="product-card" id="card-${p.id}">
    <div class="product-header">
      <div>
        <div class="product-name">${escHtml(p.name)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="product-category">${escHtml(p.category || 'Otros')}</span>
        <div class="product-actions">
          <button class="btn btn-sm" onclick="openEditProduct('${p.id}')">✏</button>
          <button class="btn btn-sm btn-danger" onclick="confirmDelete('${p.id}','${escHtml(p.name)}')">✕</button>
        </div>
      </div>
    </div>
    <div class="prices-grid">${cells}</div>
  </div>`;
}

function updateSavingsBar(filtered) {
  const bar = document.getElementById('savings-bar');
  const txt = document.getElementById('savings-text');
  const counts = {};
  STORES.forEach(s => counts[s.id] = 0);

  filtered.forEach(p => {
    const prices = p.prices || {};
    const valid = STORES.filter(s => (prices[s.id] || 0) > 0);
    if (valid.length < 2) return;
    const min = valid.reduce((a,b) => (prices[a.id] < prices[b.id] ? a : b));
    counts[min.id]++;
  });

  const best = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  if (best && best[1] > 0) {
    const store = STORES.find(s => s.id === best[0]);
    bar.classList.add('visible');
    txt.innerHTML = `${store.icon} <strong>${store.label}</strong> tiene el mejor precio en <strong>${best[1]}</strong> de tus productos con precios comparables`;
  } else {
    bar.classList.remove('visible');
  }
}

// ── MODALS ────────────────────────────────
window.openAddProduct = () => {
  editingProductId = null;
  document.getElementById('modal-title').textContent = 'Agregar producto';
  document.getElementById('prod-name').value = '';
  document.getElementById('prod-category').value = 'Otros';
  document.getElementById('price-jumbo').value = '';
  document.getElementById('price-lider').value = '';
  document.getElementById('price-mass').value = '';
  document.getElementById('product-modal').classList.add('open');
};

window.openEditProduct = (id) => {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  editingProductId = id;
  document.getElementById('modal-title').textContent = 'Editar producto';
  document.getElementById('prod-name').value = p.name;
  document.getElementById('prod-category').value = p.category || 'Otros';
  const prices = p.prices || {};
  document.getElementById('price-jumbo').value = prices.jumbo > 0 ? prices.jumbo : '';
  document.getElementById('price-lider').value = prices.lider > 0 ? prices.lider : '';
  document.getElementById('price-mass').value = prices.mass > 0 ? prices.mass : '';
  document.getElementById('product-modal').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('product-modal').classList.remove('open');
};

window.saveProduct = async () => {
  const name = document.getElementById('prod-name').value.trim();
  if (!name) { alert('Escribe el nombre del producto'); return; }
  const category = document.getElementById('prod-category').value;
  const prices = {
    jumbo: parseFloat(document.getElementById('price-jumbo').value) || 0,
    lider: parseFloat(document.getElementById('price-lider').value) || 0,
    mass:  parseFloat(document.getElementById('price-mass').value) || 0,
  };
  const id = editingProductId || Date.now().toString(36) + Math.random().toString(36).slice(2);
  await saveProductToDb({ id, name, category, prices, updatedAt: Date.now() });
  closeModal();
};

window.confirmDelete = (id, name) => {
  if (confirm(`¿Eliminar "${name}"?`)) deleteProductFromDb(id);
};

// Edit single price
window.openPriceEdit = (productId, storeId, storeLabel, currentVal) => {
  editingPriceCtx = { productId, storeId };
  document.getElementById('price-modal-title').textContent = 'Actualizar precio';
  document.getElementById('price-modal-subtitle').textContent = `${storeLabel}`;
  document.getElementById('single-price-input').value = currentVal > 0 ? currentVal : '';
  document.getElementById('price-modal').classList.add('open');
};

window.closePriceModal = () => {
  document.getElementById('price-modal').classList.remove('open');
};

window.saveSinglePrice = async () => {
  if (!editingPriceCtx) return;
  const { productId, storeId } = editingPriceCtx;
  const val = parseFloat(document.getElementById('single-price-input').value) || 0;
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;
  const prices = { ...(p.prices || {}), [storeId]: val };
  await saveProductToDb({ ...p, prices, updatedAt: Date.now() });
  closePriceModal();
};

window.clearPrice = async () => {
  if (!editingPriceCtx) return;
  const { productId, storeId } = editingPriceCtx;
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;
  const prices = { ...(p.prices || {}), [storeId]: 0 };
  await saveProductToDb({ ...p, prices, updatedAt: Date.now() });
  closePriceModal();
};

// ── SEARCH + TABS ─────────────────────────
window.filterProducts = () => renderProducts();

window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabIds = { all: 'tab-all', 'Lácteos': 'tab-lacteos', 'Panadería': 'tab-panaderia', 'Carnes': 'tab-carnes', 'Otros': 'tab-otros' };
  const el = document.getElementById(tabIds[tab]);
  if (el) el.classList.add('active');
  renderProducts();
};

// Close modals on overlay click
document.getElementById('product-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('product-modal')) closeModal();
});
document.getElementById('price-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('price-modal')) closePriceModal();
});

// ── UTILS ─────────────────────────────────
function formatPrice(n) {
  return '$' + Math.round(n).toLocaleString('es-CL');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial render placeholder
document.getElementById('product-list').innerHTML = '<div class="loading">Iniciando...</div>';
</script>
